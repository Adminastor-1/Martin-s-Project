<!-- Dinamik İçerik Yönetim Scripti -->
    <script>
        // Üst Menü Sekme Geçişi
        function switchTab(evt, tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        // --- 6 BUTONUN KENDİNE ÖZEL VERİ VERİTABANI ---
        const softwareData = {
            'soft1': {
                title: 'Linux Arch ISO',
                specs: '• İşlemci: x64 Uyumlu İşlemci<br>• Bellek: Minimum 512 MiB RAM<br>• Depolama: Kurulum için 2 GB yeterlidir ancak paket kurulumları için lütfen daha yüksek kapasiteli depolama birimi kullanınız.',
                guide: '1. İndirdiğiniz ISO dosyasını Ventoy veya Rufus yardımıyla USB belleğe yazdırın.<br>2. Bilgisayarı yeniden başlatıp boot menüsünden USB\'yi seçin.<br>3. Kurulum ekranı yüklendiğinde `archinstall` komutunu yazarak veya kılavuza göre manuel kurun.',
                link: 'https://www.mediafire.com/file/atee4ougmwtsdgd/archlinux-2026.06.01-x86_64.iso/file'
            },
            'soft2': {
                title: 'Windows Araç Paketi',
                specs: '• İşletim Sistemi: Windows 10 / 11<br>• Bellek: 4 GB RAM<br>• Ağ: İnternet Bağlantısı',
                guide: '1. Zip dosyasını klasöre çıkartın.<br>2. Setup.exe dosyasını yönetici olarak çalıştırın.<br>3. Ekrana gelen adımları onaylayarak kurulumu bitirin.',
                link: '#'
            },
            'soft3': {
                title: 'Sistem Optimize Aracılığı',
                specs: '• İşlemci: Herhangi bir modern CPU<br>• Bellek: 1 GB RAM',
                guide: '1. Uygulamayı indirin ve direkt çalıştırın.<br>2. "Taramayı Başlat" butonuna basın.<br>3. Gereksiz çerezleri tek tıkla temizleyin.',
                link: '#'
            },
            'soft4': {
                title: 'WinRAR Editör',
                specs: '• Tüm Windows sürümleriyle uyumludur.',
                guide: '1. İndirme tamamlandıktan sonra paketi açın.<br>2. Lisans sözleşmesini kabul edip yükle deyin.',
                link: '#'
            },
            'soft5': {
                title: 'Ağ Trafik İzleyici',
                specs: '• İşletim Sistemi: Windows/Linux<br>• Ağ Kartı: Destekleyen kablolu/kablosuz adaptör',
                guide: '1. Terminal veya CMD üzerinden kurulumu başlatın.<br>2. İzlemek istediğiniz ağ arayüzünü seçin.',
                link: '#'
            },
            'soft6': {
                title: 'Kayıt Defteri Temizleyici',
                specs: '• Yalnızca Windows tabanlı mimariler.',
                guide: '1. Kurulum sihirbazını başlatın.<br>2. Eski kayıtları yedekledikten sonra temizleme işlemini onaylayın.',
                link: '#'
            }
        };

        // Pencereyi Açan Fonksiyon
        function openModal(id) {
            const data = softwareData[id];
            if(data) {
                document.getElementById('m-title').innerText = data.title;
                document.getElementById('m-specs').innerHTML = data.specs;
                document.getElementById('m-guide').innerHTML = data.guide;
                document.getElementById('m-link').href = data.link;
                
                document.getElementById('softwareModal').classList.add('open');
            }
        }

        // Dışarı Tıklanınca Kapanma Fonksiyonu
        function closeModal(e) {
            if(e.target.id === 'softwareModal') {
                document.getElementById('softwareModal').classList.remove('open');
            }
        }
    </script>
